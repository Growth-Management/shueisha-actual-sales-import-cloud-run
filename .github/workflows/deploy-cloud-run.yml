# Agent-managed Cloud Run deployment workflow.
name: Deploy Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - src/**
      - integration/**
      - .github/workflows/deploy-cloud-run.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ice-sh
  REGION: asia-northeast1
  SERVICE_NAME: shueisha-actual-sales-import
  SERVICE_URL: https://shueisha-actual-sales-import-635067190197.asia-northeast1.run.app
  RUNTIME_SERVICE_ACCOUNT: drive-sales-import-runner@ice-sh.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --source=. \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --set-env-vars="PROJECT_ID=${PROJECT_ID}" \
            --no-allow-unauthenticated

      - name: Authenticate for readiness ID token
        id: auth-readiness
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.SERVICE_URL }}

      - name: Verify authenticated readiness endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ steps.auth-readiness.outputs.id_token }}" \
            "${SERVICE_URL}/readiness"
